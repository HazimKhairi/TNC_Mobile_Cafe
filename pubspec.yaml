name: tnc_cafe_mobile_app
description: "NativeCloud Café Mobile Ordering System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.12
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  url_launcher: ^6.3.1
  http: ^1.2.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/menu/
    - assets/images/menu/default-image.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_with_bg.png"
  remove_alpha_ios: true
  background_color_ios: "#FAF8F3"
  adaptive_icon_background: "#FAF8F3"
  adaptive_icon_foreground: "assets/images/logo_with_bg.png"
